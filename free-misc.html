<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бесплатное разное — каталог</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="logo">
          <a href="index.html"><img src="images/logo.png" alt="ЛОРИ" class="logo-image" /></a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html#about">О сайте</a></li>
            <li><a href="index.html#patterns">Выкройки</a></li>
            <li><a href="index.html#contacts">Контакты</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="category-page dresses-page">
      <div class="container">
        <p class="category-back">
          <a href="index.html#patterns">← Назад к категориям</a>
        </p>
        <h1 class="category-page-title">Разное (бесплатно)</h1>
        <p class="category-page-lead">
          Прочие бесплатные выкройки — подборка будет расширяться.
        </p>

        <div class="dresses-catalog-grid">
          <a
            href="product-free-misc-podstavka.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Подставка для телефона"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Подставка для телефона</h2>
            <p class="dress-product-price">Бесплатно</p>
          </a>

          <a
            href="product-free-misc-kukla.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Кукла-тильда мини"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Кукла-тильда мини</h2>
            <p class="dress-product-price">Бесплатно</p>
          </a>

          <a
            href="product-free-misc-korzinka.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Корзинка для мелочей"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Корзинка для мелочей</h2>
            <p class="dress-product-price">Бесплатно</p>
          </a>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 KidsPatterns. Все права защищены.</p>
      </div>
    </footer>
