<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прочее — каталог</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="logo">
          <a href="index.html"><img src="images/logo.png" alt="ЛОРИ" class="logo-image" /></a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html#about">О сайте</a></li>
            <li><a href="index.html#patterns">Выкройки</a></li>
            <li><a href="index.html#contacts">Контакты</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="category-page dresses-page">
      <div class="container">
        <p class="category-back">
          <a href="index.html#patterns">← Назад к категориям</a>
        </p>
        <h1 class="category-page-title">Прочее</h1>
        <p class="category-page-lead">
          Небольшие проекты и полезные мелочи — быстро шьются и отлично подходят для практики.
        </p>

        <div class="dresses-catalog-grid">
          <a
            href="product-misc-socks.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Носки «Классика»"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Носки «Классика»</h2>
            <p class="dress-product-price">220 ₽</p>
          </a>

          <a
            href="product-misc-manishka.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Манишка"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Манишка</h2>
            <p class="dress-product-price">250 ₽</p>
          </a>

          <a
            href="product-misc-belt.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Пояс для платья"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Пояс для платья</h2>
            <p class="dress-product-price">180 ₽</p>
          </a>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 KidsPatterns. Все права защищены.</p>
      </div>
    </footer>
  </body>
</html>
