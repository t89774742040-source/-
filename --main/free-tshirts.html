<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <title>Бесплатные футболки — каталог</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="logo">
          <a href="index.html"><img src="images/logo.png" alt="ЛОРИ" class="logo-image" /></a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html#about">О сайте</a></li>
            <li><a href="index.html#patterns">Выкройки</a></li>
            <li><a href="index.html#contacts">Контакты</a></li>
          </ul>
        </nav>
        <a href="cart.html" class="header-cart" aria-label="Корзина">
          <span class="header-cart-icon" aria-hidden="true">🛒</span>
          <span class="header-cart-count" id="headerCartCount">0</span>
        </a>      </div>
    </header>

    <main class="category-page dresses-page">
      <div class="container">
        <p class="category-back">
          <a href="index.html#patterns">← Назад к категориям</a>
        </p>
        <h1 class="category-page-title">Футболки (бесплатно)</h1>
        <p class="category-page-lead">
          Бесплатные выкройки футболок — простые модели для старта.
        </p>

        <div class="dresses-catalog-grid">
          <a
            href="product-free-tshirt-baza.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Футболка «База»"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Футболка «База»</h2>
            <p class="dress-product-price">Бесплатно</p>

          <a
            href="product-free-tshirt-more.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Футболка «Море»"

            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Футболка «Море»</h2>
            <p class="dress-product-price">Бесплатно</p>

          <a
            href="product-free-tshirt-limon.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Футболка «Лимон»"

            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Футболка «Лимон»</h2>
            <p class="dress-product-price">Бесплатно</p>
          </a>
        </div>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 KidsPatterns. Все права защищены.</p>
