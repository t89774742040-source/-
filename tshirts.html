<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Футболки — каталог</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="logo">
          <a href="index.html"><img src="images/logo.png" alt="ЛОРИ" class="logo-image" /></a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html#about">О сайте</a></li>
            <li><a href="index.html#patterns">Выкройки</a></li>
            <li><a href="index.html#contacts">Контакты</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="category-page dresses-page">
      <div class="container">
        <p class="category-back">
          <a href="index.html#patterns">← Назад к категориям</a>
        </p>
        <h1 class="category-page-title">Футболки</h1>
        <p class="category-page-lead">
          Базовые и фактурные футболки — быстрый пошив из джерси.
        </p>

        <div class="dresses-catalog-grid">
          <a
            href="product-tshirt-klassika.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Футболка «Классика»"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Футболка «Классика»</h2>
            <p class="dress-product-price">320 ₽</p>
          </a>

          <a
            href="product-tshirt-reglan.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Футболка с рукавом реглан"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Футболка с рукавом реглан</h2>
            <p class="dress-product-price">340 ₽</p>
          </a>

          <a
            href="product-tshirt-oversize.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Футболка оверсайз"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Футболка оверсайз</h2>
            <p class="dress-product-price">310 ₽</p>
          </a>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 KidsPatterns. Все права защищены.</p>
      </div>
    </footer>
