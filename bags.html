<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сумки — каталог</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="logo">
          <a href="index.html"><img src="images/logo.png" alt="ЛОРИ" class="logo-image" /></a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html#about">О сайте</a></li>
            <li><a href="index.html#patterns">Выкройки</a></li>
            <li><a href="index.html#contacts">Контакты</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="category-page dresses-page">
      <div class="container">
        <p class="category-back">
          <a href="index.html#patterns">← Назад к категориям</a>
        </p>
        <h1 class="category-page-title">Сумки</h1>
        <p class="category-page-lead">
          Сумки и рюкзачки для детей — компактные модели для прогулок и школы.
        </p>

        <div class="dresses-catalog-grid">
          <a
            href="product-bag-shopper.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Сумка «Мини-шоппер»"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Сумка «Мини-шоппер»</h2>
            <p class="dress-product-price">390 ₽</p>
          </a>

          <a
            href="product-bag-backpack.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Рюкзачок детский"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Рюкзачок детский</h2>
            <p class="dress-product-price">450 ₽</p>
          </a>

          <a
            href="product-bag-shoulder.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Сумка на плечо"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Сумка на плечо</h2>
            <p class="dress-product-price">370 ₽</p>
          </a>
        </div>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 KidsPatterns. Все права защищены.</p>
      </div>
    </footer>
