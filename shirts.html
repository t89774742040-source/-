<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Рубашки — каталог</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div class="logo">
          <a href="index.html"><img src="images/logo.png" alt="ЛОРИ" class="logo-image" /></a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html#about">О сайте</a></li>
            <li><a href="index.html#patterns">Выкройки</a></li>
            <li><a href="index.html#contacts">Контакты</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="category-page dresses-page">
      <div class="container">
        <p class="category-back">
          <a href="index.html#patterns">← Назад к категориям</a>
        </p>
        <h1 class="category-page-title">Рубашки</h1>
        <p class="category-page-lead">
          Рубашки для мальчиков и девочек — от базовой модели до нарядной.
        </p>

        <div class="dresses-catalog-grid">
          <a
            href="product-shirt-oxford.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Рубашка «Оксфорд»"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Рубашка «Оксфорд»</h2>
            <p class="dress-product-price">460 ₽</p>
          </a>

          <a
            href="product-shirt-shkola.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Рубашка «Школьная»"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Рубашка «Школьная»</h2>
            <p class="dress-product-price">430 ₽</p>
          </a>

          <a
            href="product-shirt-short.html"
            class="dress-product-card dress-product-card--link"
            aria-label="Рубашка с коротким рукавом"
          >
            <div class="dress-product-media" aria-hidden="true"></div>
            <h2 class="dress-product-title">Рубашка с коротким рукавом</h2>
            <p class="dress-product-price">410 ₽</p>
          </a>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 KidsPatterns. Все права защищены.</p>
      </div>
    </footer>
  </body>
</html>
